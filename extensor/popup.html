<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Gradiente da lâmina (kit SharpenUp) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <linearGradient id="bladeV" x1="60" y1="16" x2="60" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BA9FF"></stop><stop offset="1" stop-color="#1E7CF0"></stop>
    </linearGradient>
  </defs></svg>

  <header class="top">
    <span class="tile">
      <svg viewBox="40 10 40 100"><path d="M60 16 L60 90 L42 104 Z" fill="url(#bladeV)"></path><path d="M60 16 L78 104 L60 90 Z" fill="#333B45"></path></svg>
      <span class="up"><svg viewBox="0 0 24 24"><path d="M12 19V5M6 11l6-6 6 6"></path></svg></span>
    </span>
    <span class="wm">Sharpen<span class="u">Up</span></span>
    <span id="status-pill" class="status off"><span class="d"></span><span id="status-txt">offline</span></span>
  </header>

  <!-- Estado A: desconectado / parear -->
  <section id="tela-conectar" class="bd tela">
    <p class="say">Gere um <b>código de pareamento</b> no dashboard (botão <b>Conectar extensão</b>) e cole aqui pra ligar esta casa ao seu Scanner.</p>
    <div class="field">
      <label for="codigo">Código de pareamento</label>
      <input id="codigo" class="code-input" type="text" inputmode="text" autocomplete="off"
             spellcheck="false" placeholder="ABCD-EFGH" maxlength="9">
    </div>
    <button id="btn-conectar" class="btn btn--primary btn--block">Parear</button>
    <!-- Config de servidor: só p/ dev/teste (default = www.sharpen.bet). Escondido do
         usuário final; reabilitar tirando o hidden se precisar apontar p/ um preview. -->
    <button id="toggle-cfg" class="link" hidden>Configurar servidor</button>
    <div id="cfg" class="cfg" hidden>
      <label class="cfg-label" for="api-base">URL da API</label>
      <input id="api-base" class="code-input alt" type="url" placeholder="https://www.sharpen.bet">
      <button id="btn-salvar-cfg" class="btn btn--ghost btn--sm">Salvar</button>
    </div>
  </section>

  <!-- Estado B: conectado -->
  <section id="tela-conectado" class="bd tela" hidden>
    <div class="conn">
      <span class="ck"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg></span>
      <span class="tx">
        <span class="h">Conectado <span class="pos">✓</span></span>
        <span class="s"><img id="c-favicon" alt="" onerror="this.style.display='none'"><span id="c-casa">—</span> · <b id="c-parceiro">—</b></span>
      </span>
    </div>
    <div class="row">
      <button id="btn-capturar" class="btn btn--primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"></path></svg><span id="cap-label">Capturar</span>
      </button>
      <button id="btn-desconectar" class="btn btn--ghost">Desconectar</button>
    </div>
    <p id="nota-texto" class="nota" hidden>Esta casa usa <b>modo texto</b>: o robô rola a página e copia os bilhetes automaticamente.</p>
    <label id="janela-wrap" class="janela" hidden>Parar após
      <input id="lookback" type="number" min="1" max="365" step="1" value="30"> dias</label>
    <label id="stopid-wrap" class="janela" hidden>ou parar no ID
      <input id="stopid" type="text" class="stopid" placeholder="opcional" spellcheck="false" autocomplete="off"></label>
    <!-- Bet365: sem data e sem ID → marco (trecho do último bilhete já exportado) +
         teto de bilhetes (trava de custo, pois o backend não pré-dedupa sem ID). -->
    <label id="b365-marco-wrap" class="janela" hidden>Parar no último exportado
      <input id="b365-marco" type="text" class="marco" placeholder="cole um trecho" spellcheck="false" autocomplete="off"></label>
    <label id="b365-teto-wrap" class="janela" hidden>Teto de bilhetes
      <input id="b365-teto" type="number" min="0" max="500" step="1" placeholder="0"></label>
  </section>

  <p id="msg" class="msg"></p>

  <!-- Lockup oficial (mesmo da tela de login do Sharpen): lâmina + "Sharpen." + "by FDC Capital". -->
  <div class="foot">
    <svg class="lockup" viewBox="0 0 255 96" role="img" aria-label="Sharpen — by FDC Capital">
      <svg x="14" y="14" width="34" height="68" viewBox="40 10 40 100" overflow="visible">
        <defs><linearGradient id="suFootGrad" x1="60" y1="16" x2="60" y2="104" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#5BA9FF"></stop><stop offset="1" stop-color="#1E7CF0"></stop></linearGradient></defs>
        <path d="M60 16 L60 90 L42 104 Z" fill="url(#suFootGrad)"></path>
        <path d="M60 16 L78 104 L60 90 Z" fill="#333B45"></path>
      </svg>
      <text x="62" y="62" font-family="Manrope, Arial, sans-serif" font-weight="800" font-size="44" letter-spacing="-2.2" fill="#EEF2F7">Sharp<tspan fill="#3B95FF">en.</tspan></text>
      <text x="63" y="80" font-family="Manrope, Arial, sans-serif" font-weight="600" font-size="11" letter-spacing="0" fill="#95A1B0">by FDC Capital</text>
    </svg>
    <span class="ver">v0.2.3</span>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
