<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Se a sessão expirar dentro de um iframe do host (/app), o /login cairia embutido.
     Promove a tela de login para o topo → login sempre em página cheia. -->
<script>
  if (window.self !== window.top) { window.top.location.href = '/login'; }
</script>
<title>Entrar — Sharpen</title>
<meta name="theme-color" content="#0A0D12">
<link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
<link rel="manifest" href="/static/favicon/site.webmanifest">
<!-- Fontes da marca SELF-HOST (Manrope + JetBrains Mono) — sem dependência do Google Fonts. -->
<link rel="stylesheet" href="/static/fonts.css">
<link rel="stylesheet" href="/static/tokens.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.55; pointer-events: none;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
}
/* Luz azul da marca iluminando a tela por trás do card */
body::after {
  content: '';
  position: fixed; z-index: 0; pointer-events: none;
  left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 900px; height: 760px; max-width: 130vw;
  background: radial-gradient(ellipse at center, rgba(var(--accent-rgb), .16), transparent 68%);
  filter: blur(24px);
}
.card {
  position: relative; z-index: 1;
  width: 360px; max-width: calc(100vw - 32px);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg, 16px);
  padding: 32px 28px 26px;
  box-shadow: 0 20px 60px rgba(0,0,0,.45), 0 0 90px -24px rgba(var(--accent-rgb), .18);
}
.logo { display: block; width: 200px; margin: 0 auto 18px; }
.logo img { width: 100%; height: auto; display: block; }
.tagline {
  margin-top: 18px; padding-top: 20px;
  border-top: 1px solid var(--line);
  text-align: center;
  font-family: var(--font-sans);
  font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--ink-soft);
}
.tagline .hl { color: var(--accent); }
label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: .04em; text-transform: uppercase;
  color: var(--ink-mute); margin: 14px 2px 6px;
}
input {
  width: 100%; padding: 11px 13px;
  background: var(--elevated, var(--surface-2));
  border: 1px solid var(--line);
  border-radius: var(--r-sm, 10px);
  color: var(--ink); font-size: 14px; font-family: inherit;
  transition: border-color .12s;
}
input:focus { outline: none; border-color: var(--accent, #6ea8fe); }
.field { position: relative; }
.field input { padding-right: 44px; }
.olho {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; margin: 0; padding: 0;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; border-radius: var(--r-sm, 10px);
  box-shadow: none; color: var(--ink-mute); cursor: pointer;
  transition: color .12s;
}
.olho:hover { color: var(--ink); filter: none; box-shadow: none; }
.olho svg { width: 18px; height: 18px; display: block; }
.olho .ic-off { display: none; }
.olho.on .ic-on  { display: none; }
.olho.on .ic-off { display: block; }
button {
  width: 100%; margin-top: 22px; padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none; border-radius: var(--r-sm, 10px);
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: filter .12s, box-shadow .12s;
  box-shadow: 0 10px 34px -8px rgba(var(--accent-rgb), .6);
}
button:hover { filter: brightness(1.06); box-shadow: 0 12px 40px -8px rgba(var(--accent-rgb), .78); }
button:disabled { opacity: .6; cursor: default; box-shadow: none; }
.erro {
  margin-top: 14px; min-height: 16px;
  font-size: 12.5px; color: var(--neg); text-align: center;
}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/static/brand-sharpen/blade/lockup-endorsed.svg" alt="Sharpen — by FDC Capital"></div>
    <form id="form">
      <label for="usuario">Usuário</label>
      <input id="usuario" name="usuario" autocomplete="username" autofocus required>
      <label for="senha">Senha</label>
      <div class="field">
        <input id="senha" name="senha" type="password" autocomplete="current-password" required>
        <button type="button" class="olho" id="olho" aria-label="Mostrar senha">
          <svg class="ic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="ic-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button type="submit" id="btn">Entrar</button>
      <div class="erro" id="erro"></div>
    </form>
    <div class="tagline">Sharp<span class="hl">en</span> your edge.</div>
  </div>
<script>
const form = document.getElementById('form');
const btn = document.getElementById('btn');
const erro = document.getElementById('erro');

// Mostrar / ocultar senha (olhinho)
const olho = document.getElementById('olho');
const senha = document.getElementById('senha');
olho.addEventListener('click', () => {
  const mostrar = senha.type === 'password';
  senha.type = mostrar ? 'text' : 'password';
  olho.classList.toggle('on', mostrar);
  olho.setAttribute('aria-label', mostrar ? 'Ocultar senha' : 'Mostrar senha');
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  erro.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando…';
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        usuario: document.getElementById('usuario').value,
        senha: document.getElementById('senha').value,
      }),
    });
    if (r.ok) {
      window.location.href = '/app';
      return;
    }
    const data = await r.json().catch(() => ({}));
    erro.textContent = data.detail || 'Usuário ou senha inválidos.';
  } catch (_) {
    erro.textContent = 'Erro de conexão. Tente novamente.';
  }
  btn.disabled = false;
  btn.textContent = 'Entrar';
});
</script>
</body>
</html>
