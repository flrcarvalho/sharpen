<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharpen — Betting Dashboard</title>

  <!-- Casca única (Fatia 2): dentro do host (/app) esconde a sidebar/topbar internas;
       aberto direto (fora de iframe) redireciona pra casca preservando a página. -->
  <script>
    (function(){
      if (window.self !== window.top) { document.documentElement.classList.add('embedded'); }
      else { location.replace('/app#dash/' + ((location.hash || '').replace(/^#/, '') || 'overview')); }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/static/favicon/site.webmanifest">
  <meta name="theme-color" content="#0A0D12">

  <!-- Manrope + JetBrains Mono (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Design System CSS — ?v= força o navegador a recarregar após edições (cache-busting) -->
  <link rel="stylesheet" href="assets/css/tokens.css?v=2">
  <link rel="stylesheet" href="/static/shell.css?v=1"><!-- casca compartilhada c/ o Planilhador (etapa A) -->
  <link rel="stylesheet" href="assets/css/layout.css?v=4">
  <link rel="stylesheet" href="assets/css/components.css?v=6">

  <!-- Aparência init: aplica tema antes do render para evitar flash.
       App 100% dark por enquanto — dark cravado, sem leitura de localStorage
       nem seletor de tema (tema claro adiado; bloco [data-theme=light] dormente). -->
  <script>
    (function() {
      var h=document.documentElement;
      h.setAttribute('data-theme','dark');
      h.setAttribute('data-density','compact');
      h.classList.add('t-page-gradient');
      h.classList.add('kpi-azul');
    })();
  </script>
</head>
<body>

<div id="root"></div>

<!-- Chart.js (vendorizado — sem dependência de CDN externo; ver CSP em main.py) -->
<script src="vendor/chart.umd.js" defer></script>
<!-- html2canvas (export popup) — vendorizado -->
<script src="vendor/html2canvas.min.js" defer></script>

<!-- App — ordem de carregamento respeitada com defer. ?v= = cache-busting: bump ao editar -->
<script src="assets/js/data.js?v=4"              defer></script>
<script src="assets/js/filters.js?v=4"           defer></script>
<script src="assets/js/charts/shared.js?v=2"     defer></script>
<script src="assets/js/charts/gestao.js?v=3"     defer></script>
<script src="assets/js/charts/overview.js?v=4"   defer></script>
<script src="assets/js/charts/temporal.js?v=3"   defer></script>
<script src="assets/js/charts/performance.js?v=5" defer></script>
<script src="assets/js/charts/apostas.js?v=4"    defer></script>
<script src="assets/js/app.js?v=10"              defer></script>

</body>
</html>
