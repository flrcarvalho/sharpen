<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharpen</title>
<meta name="theme-color" content="#0A0D12">
<link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
<link rel="manifest" href="/static/favicon/site.webmanifest">
<!-- Fontes da marca SELF-HOST (Manrope + JetBrains Mono) — sem dependência do Google Fonts. -->
<link rel="stylesheet" href="/static/fonts.css">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/shell.css"><!-- casca compartilhada: .nav-group/.nav-item/.nav-icon -->
<style>
/* ── Host da casca única (/app) ──────────────────────────────────────────────
   Dono da sidebar (uma só, sempre viva) + 2 iframes (Planilhador + Dashboard).
   Navegar = mostrar/esconder o iframe certo, NUNCA recarregar a casca.
   A geometria da sidebar espelha exatamente a dos 2 apps (SHELL_SPEC §1, pós-Fatia 1). */
* { box-sizing: border-box; margin: 0; padding: 0; }
* { scrollbar-width: thin; scrollbar-color: var(--fdc-steel) var(--surface); }
body {
  background: var(--bg);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.55; pointer-events: none;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
}
.app-host {
  position: relative; z-index: 1;
  display: flex; width: 100%; height: 100vh; overflow: hidden;
  color: var(--ink); font-family: var(--font-sans);
}
/* Sidebar — valores idênticos ao Planilhador/Dashboard (Fatia 1). */
.sidebar {
  width: 264px; height: 100vh; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--line-2);
  padding: 0; display: flex; flex-direction: column; overflow: hidden;
}
/* Marca Sharpen: símbolo blade + wordmark (espelha .side__brand do modelo Sharpen).
   Mantém o padding 6·8·16 e o border-bottom que ancoram o topo da sidebar. */
.brand {
  display: flex; align-items: center; justify-content: center; gap: 14px; flex-shrink: 0;
  margin: 0 0 4px; padding: 10px 8px 18px; border-bottom: 1px solid var(--line-2);
}
.brand .brand-symbol { width: 24px; height: 60px; flex-shrink: 0; display: block; user-select: none; -webkit-user-drag: none; }
.brand .wm { display: flex; flex-direction: column; gap: 3px; line-height: 1; }
.brand .w { font-weight: 800; font-size: 36px; letter-spacing: -.04em; color: var(--ink); }
.brand .w .e { color: var(--accent-2); }
/* Nota de endosso no rodapé da sidebar (Manual v1.1): discreta, mono/mute. */
/* Endosso (tier 5): centralizado, mono minúsculo, uppercase espaçado, discreto. */
.sidebar-nav { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 4px 0; margin: 0; }
/* Rodapé em tiers: usuário → status de sync → ações pareadas → sair.
   Empurrado pro fundo (margin-top:auto) e ritmado por gap (sem margens soltas). */
.sidebar-bottom { flex-shrink: 0; margin-top: auto; padding: 14px 6px 4px; border-top: 1px solid var(--line-2); display: flex; flex-direction: column; gap: 10px; }
/* Status de sync (tier 2): centralizado — dot + rótulo na 1ª linha, data na 2ª. */
.last-update {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute);
}
.sync-top { display: inline-flex; align-items: center; gap: 6px; }
.sync-time { color: var(--ink-mute); font-variant-numeric: tabular-nums; }
@keyframes pulse-dot {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(var(--pos-rgb),.4); }
  50%      { opacity: .8; box-shadow: 0 0 0 4px rgba(var(--pos-rgb),0); }
}
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--pos);
  display: inline-block; flex-shrink: 0; animation: pulse-dot 2s infinite;
}
@media (prefers-reduced-motion: reduce) { .pulse-dot { animation: none; } }
/* Ação utilitária (tier 3): Atualizar — ghost mono, ícone 13px + rótulo,
   hover com borda azul (--accent). O "Baixar CSV" migrou p/ a aba Apostas. */
.sb-actions { display: grid; grid-template-columns: 1fr; gap: 6px; }
.host-refresh {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; margin: 0; padding: 8px 6px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .02em;
  color: var(--ink-soft); background: transparent;
  border: 1px solid var(--line); border-radius: var(--r-sm); text-decoration: none;
  cursor: pointer; transition: border-color .2s, color .2s;
}
.host-refresh:hover { border-color: rgba(var(--accent-rgb),.4); color: var(--ink); }
/* Área de conteúdo: os 2 iframes empilhados. Crossfade curto ao trocar (reforça
   "é um app só"); ambos ficam sempre montados (estado vivo), só muda opacidade/camada. */
.host-main { flex: 1; position: relative; min-width: 0; }
.app-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg);
  opacity: 0; z-index: 0; pointer-events: none; transition: opacity .18s ease; }
.app-frame.active { opacity: 1; z-index: 1; pointer-events: auto; }
@media (prefers-reduced-motion: reduce) { .app-frame { transition: none; } }
/* Atualizar dados (host): recarrega a base do Dashboard. Estilo base na regra
   .host-refresh acima; aqui ficam só o ícone e o estado "atualizando". */
.host-refresh .host-refresh-ico { display: inline-block; line-height: 1; font-size: 13px; }
/* Estado "atualizando": botão desabilitado + seta girando (feedback do clique). */
.host-refresh.is-loading { opacity: .7; cursor: default; border-color: var(--line); color: var(--ink-soft); }
.host-refresh:disabled { pointer-events: none; }
.host-refresh.is-loading .host-refresh-ico { animation: host-spin .7s linear infinite; }
@keyframes host-spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .host-refresh.is-loading .host-refresh-ico { animation: none; } }
/* Sair: encerra a sessão (POST /logout → /login). Discreto; o hover sinaliza a saída
   (mesmo padrão do "arquivar" — neutro em repouso, --neg só na intenção). */
/* Sair (tier 4): full-width, discreto em repouso (--ink-mute), hover vermelho. */
.sb-logout {
  width: 100%; margin: 0; padding: 8px 9px;
  font-family: var(--font-sans); font-size: 12px; font-weight: 500;
  background: transparent; color: var(--ink-mute);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: border-color .12s, color .12s;
}
.sb-logout svg { width: 13px; height: 13px; flex-shrink: 0; }
.sb-logout:hover { border-color: rgba(var(--neg-rgb),.45); color: var(--neg); }
/* Operador (tier 1) — identidade + trocador "ver base de" (donos). O espaçamento
   entre tiers vem do gap do .sidebar-bottom, sem separador próprio. */
.sb-operador { position: relative; }
.sb-op-trigger { width: 100%; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-sm); cursor: default; text-align: left; color: var(--ink); font-family: var(--font-sans); }
.sb-operador.has-switch .sb-op-trigger { cursor: pointer; }
.sb-operador.has-switch .sb-op-trigger:hover { border-color: var(--ink-mute); }
.sb-op-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--pos); flex: none; }
.sb-op-meta { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.sb-op-lbl { font-family: var(--font-mono); font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); }
.sb-op-nome { font-size: 12px; font-weight: 600; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-op-caret { font-size: 9px; color: var(--ink-mute); flex: none; display: none; transition: transform .15s; }
.sb-operador.has-switch .sb-op-caret { display: block; }
.sb-operador.open .sb-op-caret { transform: rotate(180deg); }
.sb-op-menu { display: none; position: absolute; bottom: calc(100% + 6px); left: 0; right: 0; background: var(--elevated); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 5px; box-shadow: var(--glow); z-index: 20; }
.sb-operador.open .sb-op-menu { display: block; }
.sb-op-head { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); padding: 6px 8px 4px; }
.sb-op-menu button { width: 100%; text-align: left; padding: 8px 10px; background: transparent; border: 0; border-radius: var(--r-xs); color: var(--ink-soft); font-family: var(--font-sans); font-size: 12px; cursor: pointer; }
.sb-op-menu button:hover { background: var(--surface-2); color: var(--ink); }
.sb-op-menu button.ativo { color: var(--accent); }
.sb-op-menu button.voltar { color: var(--ink-soft); border-top: 1px solid var(--line); margin-top: 4px; }
.sb-operador.vendo .sb-op-trigger { border-color: var(--accent); }
.sb-operador.vendo .sb-op-dot { background: var(--accent); }
.sb-operador.vendo .sb-op-lbl { color: var(--accent); }
</style>
</head>

    <iframe id="fr-inicio" class="app-frame active" src="/inicio" title="Início"></iframe>

<script>
/* Roteador do host: a URL (hash) é a fonte de verdade.
   #plan · #plan/contas → Planilhador (via mostrarView)
   #dash/<page>         → Dashboard (via showPage; 1ª carga é deep-link por #<page>)
   Trocar de app = mostrar/esconder iframe → a casca (sidebar) NUNCA recarrega,
   e o estado de cada app sobrevive (ex.: extração em andamento). */
(function(){
  var frInicio = document.getElementById('fr-inicio');
  var frPlan = document.getElementById('fr-plan');
  var frDash = document.getElementById('fr-dash');
  var dashLoaded = false;
  var current = { app: 'inicio', target: '' };   // porta de entrada = Início

  function setActive(key){
    var items = document.querySelectorAll('.nav-item[data-key]');
    for (var i = 0; i < items.length; i++){
      items[i].classList.toggle('active', items[i].getAttribute('data-key') === key);
    }
  }
  function showFrame(which){
    frInicio.classList.toggle('active', which === 'inicio');
    frPlan.classList.toggle('active', which === 'plan');
    frDash.classList.toggle('active', which === 'dash');
  }
  function callPlan(view){ try { frPlan.contentWindow.mostrarView(view); } catch(e){} }
  function callDash(page){ try { frDash.contentWindow.showPage(page); } catch(e){} }

  function go(app, target){
    if (app === 'inicio'){
      current = { app: 'inicio', target: '' };
      showFrame('inicio');
      setActive('inicio');
    } else if (app === 'dash'){
      var page = target || 'overview';
      current = { app: 'dash', target: page };
      if (!dashLoaded){ frDash.src = '/dashboard/#' + page; dashLoaded = true; }
      else { callDash(page); }
      showFrame('dash');
      setActive('dash:' + page);
    } else {
      var view = target || 'extracao';
      current = { app: 'plan', target: view };
      callPlan(view);
      showFrame('plan');
      setActive('plan:' + view);
    }
  }

  function route(){
    var h = (location.hash || '').replace(/^#/, '');
    if (h.indexOf('dash') === 0){ go('dash', h.split('/')[1] || 'overview'); }
    else if (h.indexOf('plan') === 0){ go('plan', h.split('/')[1] || 'extracao'); }
    else { go('inicio'); }   // '' ou '#inicio' → home pós-login
  }

  // Deep-link a frio: reaplica o alvo quando o iframe termina de montar.
  frPlan.addEventListener('load', function(){ if (current.app === 'plan') setTimeout(function(){ callPlan(current.target); }, 0); });
  frDash.addEventListener('load', function(){ if (current.app === 'dash') setTimeout(function(){ callDash(current.target); }, 0); });

  // Atualizar dados: recarrega a base do app ATIVO (os iframes ficam vivos → sem esse
  // botão os dados envelheceriam numa sessão longa). Age no Início e no Dashboard.
  // Feedback: enquanto o loadData do iframe roda, o botão gira ("Atualizando…") e,
  // ao concluir, o rótulo "último sync" reflete o builtAt do servidor. Antes o botão
  // vivia aqui no host mas SEM sinal visível — parecia morto (o spinner do Dashboard
  // girava escondido dentro do iframe, e o texto ao lado era fixo "Dados sincronizados").
  var refreshBtn = document.getElementById('hostRefresh');
  var lastUpdateEl = document.querySelector('.last-update');
  function _p2(n){ return String(n).length < 2 ? '0' + n : '' + n; }
  function fmtSync(ms){
    if (!ms) return '';
    var d = new Date(ms);
    return _p2(d.getDate()) + '/' + _p2(d.getMonth()+1) + ' · ' + _p2(d.getHours()) + ':' + _p2(d.getMinutes());
  }
  // Alvo do ↻ = o app VISÍVEL que sabe recarregar a própria base (Início e Dashboard
  // expõem loadData(force); a Extração não tem base). Antes o botão só falava com o
  // Dashboard: quem estava na tela de Início clicava e NADA acontecia — e é justo lá
  // que mora o painel "Apostas em Aberto" da carteira de planilha ao vivo, o retrato
  // que mais envelhece (cache do Apps Script, 30 min). Com a Extração aberta, cai no
  // Dashboard (se já carregado) ou no Início, pra o botão nunca ficar morto.
  function refreshTarget(){
    var ordem = current.app === 'inicio' ? [frInicio, frDash]
              : current.app === 'dash'   ? [frDash, frInicio]
              :                            [frDash, frInicio];
    for (var i = 0; i < ordem.length; i++){
      var fr = ordem[i];
      if (fr === frDash && !dashLoaded) continue;   // Dashboard ainda não abriu
      try { if (fr.contentWindow && fr.contentWindow.loadData) return fr; } catch(e){}
    }
    return null;
  }
  function readBuilt(fr){ try { return (fr || frDash).contentWindow._dataBuiltMs || 0; } catch(e){ return 0; } }
  function paintSync(){
    if (!lastUpdateEl) return;
    var t = fmtSync(readBuilt(refreshTarget()));
    lastUpdateEl.innerHTML = '<span class="sync-top"><span class="pulse-dot"></span>Dados sincronizados</span>'
      + (t ? '<span class="sync-time">' + t + '</span>' : '');
  }
  function setRefreshing(on){
    if (!refreshBtn) return;
    refreshBtn.classList.toggle('is-loading', on);
    refreshBtn.disabled = on;
    refreshBtn.innerHTML = '<span class="host-refresh-ico">↻</span> ' + (on ? 'Atualizando…' : 'Atualizar');
  }
  if (refreshBtn) refreshBtn.addEventListener('click', function(){
    if (refreshBtn.disabled) return;
    var alvo = refreshTarget();
    if (!alvo) return;                                        // nenhum app com base carregado ainda
    setRefreshing(true);
    var t0 = Date.now();
    var finish = function(){                                  // duração mínima p/ não piscar
      var wait = 600 - (Date.now() - t0); if (wait < 0) wait = 0;
      setTimeout(function(){ setRefreshing(false); paintSync(); }, wait);
    };
    var p; try { p = alvo.contentWindow.loadData(true); } catch(e){ finish(); return; }
    Promise.resolve(p).then(finish, finish);                  // loadData resolve mesmo em erro (trata interno)
  });
  // Mantém "último sync" vivo (1ª carga do Dashboard, refresh manual ou revalidação
  // em 2º plano). Barato: só lê um número do iframe a cada 3s.
  setInterval(paintSync, 3000);

  // Sair: confirma, encerra a sessão no servidor (apaga cookie) e volta pro login.
  // O redirect roda sempre — mesmo se o POST falhar (fetch rejeitado), pra não prender o usuário.
  var logoutBtn = document.getElementById('hostLogout');
  if (logoutBtn) logoutBtn.addEventListener('click', function(){
    if (!confirm('Encerrar a sessão e sair?')) return;
    fetch('/logout', { method: 'POST' }).catch(function(){}).then(function(){ window.location.href = '/login'; });
  });

  window.addEventListener('hashchange', route);
  route();
})();

/* Operador no rodapé da sidebar: identidade + trocador "ver base de" (só donos com
   operadores). Trocar = POST /ver-como + reload da casca (recria os iframes com o novo
   dono efetivo → estado limpo em toda a base). O "Sair" continua sendo o #hostLogout. */
(function(){
  var wrap = document.getElementById('sbOperador');
  var trig = document.getElementById('sbOpTrigger');
  if (!wrap || !trig) return;
  function verComo(alvo){
    fetch('/ver-como', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ alvo: alvo }) })
      .catch(function(){}).then(function(){ window.location.reload(); });
  }
  fetch('/me').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
    if (!d) return;
    var real = d.usuario || '';
    var efetivo = d.dono_efetivo || real;
    var ops = d.operadores || [];
    var vendo = efetivo !== real;
    document.getElementById('sbOpNome').textContent = efetivo || 'operador';
    document.getElementById('sbOpLbl').textContent = vendo ? 'Vendo' : 'Usuário';
    wrap.classList.toggle('vendo', vendo);
    if (ops.length) {
      var sw = document.getElementById('sbOpSwitch');
      var head = document.createElement('div'); head.className = 'sb-op-head'; head.textContent = 'Ver base de'; sw.appendChild(head);
      ops.forEach(function(op){
        var b = document.createElement('button'); b.textContent = op;
        if (op === efetivo) b.className = 'ativo';
        b.addEventListener('click', function(){ verComo(op); });
        sw.appendChild(b);
      });
      if (vendo) {
        var volta = document.createElement('button'); volta.className = 'voltar'; volta.textContent = '↩ Voltar para ' + real;
        volta.addEventListener('click', function(){ verComo(''); });
        sw.appendChild(volta);
      }
      wrap.classList.add('has-switch');
    }
  }).catch(function(){});
  trig.addEventListener('click', function(e){ e.stopPropagation(); if (wrap.classList.contains('has-switch')) wrap.classList.toggle('open'); });
  document.addEventListener('click', function(e){ if (!wrap.contains(e.target)) wrap.classList.remove('open'); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') wrap.classList.remove('open'); });
})();
</script>

</body>
</html>
