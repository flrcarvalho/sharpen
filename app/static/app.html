<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDC Capital</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/shell.css"><!-- casca compartilhada: .nav-group/.nav-item/.nav-icon -->
<style>
/* ── Host da casca única (/app) ──────────────────────────────────────────────
   Dono da sidebar (uma só, sempre viva) + 2 iframes (Planilhador + Dashboard).
   Navegar = mostrar/esconder o iframe certo, NUNCA recarregar a casca.
   A geometria da sidebar espelha exatamente a dos 2 apps (SHELL_SPEC §1, pós-Fatia 1). */
* { box-sizing: border-box; margin: 0; padding: 0; }
* { scrollbar-width: thin; scrollbar-color: var(--fdc-steel) var(--surface); }
body {
  background: var(--bg);
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.55; pointer-events: none;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
}
.app-host {
  position: relative; z-index: 1;
  display: flex; width: 100%; height: 100vh; overflow: hidden;
  color: var(--ink); font-family: var(--font-sans);
}
/* Sidebar — valores idênticos ao Planilhador/Dashboard (Fatia 1). */
.sidebar {
  width: 264px; height: 100vh; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--line-2);
  padding: 0; display: flex; flex-direction: column; overflow: hidden;
}
.brand {
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  margin: 0 0 4px; padding: 6px 8px 16px; border-bottom: 1px solid var(--line-2);
}
.brand img { width: 100%; height: auto; display: block; margin: 0 auto; user-select: none; -webkit-user-drag: none; }
.sidebar-nav { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 4px 0; margin: 0; }
.sidebar-bottom { flex-shrink: 0; margin: 0; padding: 12px 16px; border-top: 1px solid var(--line-2); }
.last-update {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-size: var(--text-xxs); color: var(--ink-mute);
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(var(--pos-rgb),.4); }
  50%      { opacity: .8; box-shadow: 0 0 0 4px rgba(var(--pos-rgb),0); }
}
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--pos);
  display: inline-block; flex-shrink: 0; animation: pulse-dot 2s infinite;
}
@media (prefers-reduced-motion: reduce) { .pulse-dot { animation: none; } }
.sb-csv {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; margin-top: 10px; padding: 9px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em;
  color: var(--ink-soft); background: var(--surface-2);
  border: 1px solid var(--line); border-radius: var(--r-sm); text-decoration: none;
  transition: border-color .2s, color .2s;
}
.sb-csv svg { width: 13px; height: 13px; flex-shrink: 0; }
.sb-csv:hover { border-color: rgba(var(--accent-rgb),.4); color: var(--ink); }
/* Área de conteúdo: os 2 iframes empilhados. Crossfade curto ao trocar (reforça
   "é um app só"); ambos ficam sempre montados (estado vivo), só muda opacidade/camada. */
.host-main { flex: 1; position: relative; min-width: 0; }
.app-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: var(--bg);
  opacity: 0; z-index: 0; pointer-events: none; transition: opacity .18s ease; }
.app-frame.active { opacity: 1; z-index: 1; pointer-events: auto; }
@media (prefers-reduced-motion: reduce) { .app-frame { transition: none; } }
/* Atualizar dados (host): restaura o refresh do Dashboard que ficou escondido na
   Fatia 2. Espelha o .update-btn do Dashboard (dash/layout.css). */
.host-refresh {
  width: 100%; margin-top: 8px; padding: 7px 9px;
  font-family: var(--font-sans); font-size: 12px; font-weight: 500;
  background: transparent; color: var(--ink-soft);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  cursor: pointer; transition: border-color .12s, color .12s;
}
.host-refresh:hover { border-color: var(--accent-2); color: var(--accent-2); }
</style>
</head>
<body>
<div class="app-host">

  <!-- Sidebar ÚNICA do host (as internas dos 2 apps somem no modo embedded). -->
  <aside class="sidebar">
    <div class="brand">
      <img src="/static/fdc-logo-horizontal-dark.svg" alt="FDC Capital" draggable="false">
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group">Operação</div>
      <div class="nav-item" data-key="plan:extracao" onclick="location.hash='plan'" title="Extração de bilhetes"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1.5" y="1.5" width="13" height="13" rx="1"/><path d="M1.5 5.5h13M1.5 9.5h13M5.5 1.5v13"/></svg>Planilhador</div>
      <div class="nav-item" data-key="plan:contas" onclick="location.hash='plan/contas'" title="Gestão de contas e parceiros"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M8 1.7l6 3-6 3-6-3z"/><path d="M2 4.7v6.6l6 3 6-3V4.7"/></svg>Contas &amp; Parceiros</div>
      <div class="nav-group">Análise</div>
      <div class="nav-item" data-key="dash:overview" onclick="location.hash='dash/overview'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Visão Geral</div>
      <div class="nav-item" data-key="dash:sports" onclick="location.hash='dash/sports'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12l4-4 3 3 5-6"/></svg>Esportes</div>
      <div class="nav-item" data-key="dash:casas" onclick="location.hash='dash/casas'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M1 8h14M5 3v10"/></svg>Bookies</div>
      <div class="nav-item" data-key="dash:apostas" onclick="location.hash='dash/apostas'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4h12M2 8h12M2 12h8"/><rect x="1" y="2" width="14" height="12" rx="1"/></svg>Apostas</div>
      <div class="nav-item" data-key="dash:tipsters" onclick="location.hash='dash/tipsters'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.5 2.2-4 5-4s5 1.5 5 4"/><circle cx="12" cy="5" r="2"/><path d="M12 9c1.5.3 3 1.2 3 4"/></svg>Tipsters</div>
      <div class="nav-group">Resultados</div>
      <div class="nav-item" data-key="dash:resultados" onclick="location.hash='dash/resultados'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="1" width="14" height="14" rx="1"/><path d="M1 6h14M1 11h14M6 1v14M11 1v14"/></svg>Resultados</div>
      <div class="nav-group">Gestão</div>
      <div class="nav-item" data-key="dash:parceiros" onclick="location.hash='dash/parceiros'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="12" height="9" rx="1"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>Fornecedores &amp; Parceiros</div>
      <div class="nav-item" data-key="dash:custos" onclick="location.hash='dash/custos'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v12M5 5h4.5a2 2 0 010 4H5m0 0h5a2 2 0 010 4H5"/></svg>Custos de Contas</div>
      <div class="nav-item" data-key="dash:custos_tipster" onclick="location.hash='dash/custos_tipster'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="6" cy="5" r="2.5"/><path d="M1 13.5C1 11 3 10 6 10s5 1 5 3.5"/><circle cx="12" cy="5" r="2"/><path d="M10 13.2c.6-.5 2-.7 2-.7"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="10" y1="10" x2="14" y2="10"/></svg>Custo de Tipsters</div>
      <div class="nav-item" data-key="dash:metrics" onclick="location.hash='dash/metrics'"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v2M8 12v2M2 8h2m8 0h2"/><circle cx="8" cy="8" r="3"/></svg>Métricas</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="last-update"><span class="pulse-dot"></span>Dados sincronizados</div>
      <a href="/exportar.csv" class="sb-csv" title="Baixar toda a base como CSV (backup)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Baixar base (CSV)</a>
      <button class="host-refresh" id="hostRefresh" title="Recarregar os dados do Dashboard">↻ Atualizar dados</button>
    </div>
  </aside>

  <!-- Conteúdo: os 2 apps carregados como iframes (mesma origem → chamada cruzada OK).
       O Planilhador carrega já; o Dashboard é lazy (só no 1º clique em Análise). -->
  <main class="host-main">
    <iframe id="fr-plan" class="app-frame" src="/" title="Planilhador"></iframe>
    <iframe id="fr-dash" class="app-frame" title="Dashboard"></iframe>
  </main>

</div>

<script>
/* Roteador do host: a URL (hash) é a fonte de verdade.
   #plan · #plan/contas → Planilhador (via mostrarView)
   #dash/<page>         → Dashboard (via showPage; 1ª carga é deep-link por #<page>)
   Trocar de app = mostrar/esconder iframe → a casca (sidebar) NUNCA recarrega,
   e o estado de cada app sobrevive (ex.: extração em andamento). */
(function(){
  var frPlan = document.getElementById('fr-plan');
  var frDash = document.getElementById('fr-dash');
  var dashLoaded = false;
  var current = { app: 'plan', target: 'extracao' };

  function setActive(key){
    var items = document.querySelectorAll('.nav-item[data-key]');
    for (var i = 0; i < items.length; i++){
      items[i].classList.toggle('active', items[i].getAttribute('data-key') === key);
    }
  }
  function showFrame(which){
    frPlan.classList.toggle('active', which === 'plan');
    frDash.classList.toggle('active', which === 'dash');
  }
  function callPlan(view){ try { frPlan.contentWindow.mostrarView(view); } catch(e){} }
  function callDash(page){ try { frDash.contentWindow.showPage(page); } catch(e){} }

  function go(app, target){
    if (app === 'dash'){
      var page = target || 'overview';
      current = { app: 'dash', target: page };
      if (!dashLoaded){ frDash.src = '/dashboard/#' + page; dashLoaded = true; }
      else { callDash(page); }
      showFrame('dash');
      setActive('dash:' + page);
    } else {
      var view = target || 'extracao';
      current = { app: 'plan', target: view };
      callPlan(view);
      showFrame('plan');
      setActive('plan:' + view);
    }
  }

  function route(){
    var h = (location.hash || '').replace(/^#/, '');
    if (h.indexOf('dash') === 0){ go('dash', h.split('/')[1] || 'overview'); }
    else { go('plan', h.split('/')[1] || 'extracao'); }
  }

  // Deep-link a frio: reaplica o alvo quando o iframe termina de montar.
  frPlan.addEventListener('load', function(){ if (current.app === 'plan') setTimeout(function(){ callPlan(current.target); }, 0); });
  frDash.addEventListener('load', function(){ if (current.app === 'dash') setTimeout(function(){ callDash(current.target); }, 0); });

  // Atualizar dados: recarrega a base do Dashboard (o iframe fica vivo → sem esse
  // botão os dados envelheceriam numa sessão longa). Só age se o Dashboard já abriu.
  var refreshBtn = document.getElementById('hostRefresh');
  if (refreshBtn) refreshBtn.addEventListener('click', function(){
    try { if (dashLoaded && frDash.contentWindow.loadData) { frDash.contentWindow.loadData(true); } } catch(e){}
  });

  window.addEventListener('hashchange', route);
  route();
})();
</script>

</body>
</html>
