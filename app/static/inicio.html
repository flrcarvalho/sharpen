<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharpen — Início</title>
<meta name="theme-color" content="#0A0D12">
<link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<style>
/* ── Página Início (home pós-login) — a PORTA DE ENTRADA do Sharpen ──────────────
   Não é decorativa: dá consciência situacional (como estou, o que está vivo, o que
   preciso fazer, de onde vem o resultado) + a ação primária. Servida como iframe da
   casca (/app); a sidebar é do host. Todos os números vêm do dataset real
   (/dashboard/data, /bilhetes, /parceiros, /incompletos + RAIO-X em localStorage). */
* { box-sizing: border-box; margin: 0; padding: 0; }
* { scrollbar-width: thin; scrollbar-color: var(--fdc-steel) transparent; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--ink);
  font-family: var(--font-sans); letter-spacing: -.01em;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
  background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
}
a { color: var(--accent-2); text-decoration: none; }
a:hover { color: var(--accent); }
.mono { font-family: var(--font-mono); }
.acc { color: var(--accent-2); }

.main { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 30px 40px 34px; display: flex; flex-direction: column; min-height: 100%; gap: 16px; }

/* Componente monetário canônico (verbatim de dash/components.css + app.js). Nesta
   página o R$ é sempre INLINE (nunca coluna de planilha) → width auto, sem esticar. */
.money { display: inline-flex; align-items: baseline; gap: 3px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.money-sign { font-size: 0.76em; color: var(--ink-soft); }
.money-val { font-variant-numeric: tabular-nums; }
.money.pos .money-val { color: var(--pos); } .money.neg .money-val { color: var(--neg); }

/* ── Cabeçalho ── */
.head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-mute); }
h1 { font-size: 29px; font-weight: 800; letter-spacing: -.035em; margin: 8px 0 0; }
.briefing { font-size: 15px; color: var(--ink-soft); line-height: 1.55; margin-top: 10px; max-width: 70ch; }
.briefing b { color: var(--ink); font-weight: 700; }
.btn { font-weight: 700; font-size: 13px; border-radius: var(--r-sm); padding: 11px 18px; border: 1px solid transparent; background: var(--accent); color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-sans); white-space: nowrap; }
.btn:hover { filter: brightness(1.06); }
.btn svg { flex: none; }

/* ── KPIs ── */
.kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.kpi { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 15px 17px; min-width: 0; }
.kpi .k { font-family: var(--font-mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-mute); }
.kpi .v { font-family: var(--font-mono); font-size: 22px; font-weight: 600; margin-top: 9px; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kpi .v.plain { color: var(--ink); } .kpi .v.acc { color: var(--accent-2); }
.kpi .d { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-mute); margin-top: 7px; display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
.kpi.feat { background: linear-gradient(180deg, rgba(var(--accent-rgb),.10), var(--surface) 65%); border-color: rgba(var(--accent-rgb),.32); }

/* ── Corpo em 2 colunas (cresce p/ preencher a altura) ── */
.body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; flex: 1 1 auto; align-items: stretch; }
.col { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
/* Painéis marcados com flex:1 absorvem a sobra → as duas colunas fecham na mesma altura. */
.panel.grow { flex: 1 1 auto; }
.panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; display: flex; flex-direction: column; }
.ph { display: flex; align-items: center; gap: 10px; padding: 13px 18px; border-bottom: 1px solid var(--line); }
.ph .tick { width: 3px; height: 15px; border-radius: 3px; background: var(--accent); flex: none; }
.ph h3 { margin: 0; font-size: 13px; font-weight: 700; color: var(--accent-2); }
.ph .meta { margin-left: auto; font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); }
.plist { display: flex; flex-direction: column; }

.lrow { display: flex; align-items: center; gap: 12px; padding: 11px 18px; border-bottom: 1px solid var(--line-2); font-size: 12.5px; }
.lrow:last-child { border-bottom: 0; }
.lrow.clic { cursor: pointer; transition: background .12s; }
.lrow.clic:hover { background: var(--surface-2); }
.lrow .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.lrow .spdot { width: 22px; height: 22px; border-radius: 6px; background: var(--surface-2); border: 1px solid var(--line-2); display: grid; place-items: center; font-size: 12px; flex: none; filter: grayscale(.2); }
.lrow .lc { min-width: 0; flex: 1; }
.lrow .t { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lrow .s { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lrow .r { margin-left: auto; font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums; flex: none; display: flex; align-items: baseline; gap: 7px; }
.lrow .r.acc { color: var(--accent-2); }
.lrow .odd { color: var(--ink-mute); font-size: 11px; }
.empty { padding: 22px 18px; text-align: center; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-mute); }
.empty.ok { color: var(--pos); }

/* Barras de ranking (Resultado por esporte) — reusa a linguagem do painel de contas. */
.bar { display: grid; grid-template-columns: 22px 1fr 84px; align-items: center; gap: 11px; padding: 9px 18px; border-bottom: 1px solid var(--line-2); }
.bar:last-child { border-bottom: 0; }
.bar .be { font-size: 13px; text-align: center; filter: grayscale(.2); }
.bar .bn { min-width: 0; }
.bar .bname { font-size: 12.5px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar .btrack { height: 5px; border-radius: var(--r-pill); background: rgba(var(--accent-rgb),.10); overflow: hidden; margin-top: 5px; }
.bar .bfill { height: 100%; border-radius: var(--r-pill); }
.bar .bfill.pos { background: var(--pos); } .bar .bfill.neg { background: var(--neg); }
.bar .bval { text-align: right; font-size: 11.5px; }

.foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 18px; border-top: 1px solid var(--line-2); font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-mute); }
.foot b { color: var(--ink-soft); font-weight: 600; }

/* Glifo IA (assina o que a IA tocou). */
.hglifo { width: 15px; height: 15px; flex: none; display: grid; place-items: center; }
.hglifo.ok { color: var(--pos); } .hglifo.warn { color: var(--warn); }
.hglifo svg { width: 100%; height: 100%; }

.brandfoot { text-align: center; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-mute); letter-spacing: .08em; padding-top: 2px; }

@media (max-width: 1000px) {
  .kpis { grid-template-columns: 1fr 1fr; }
  .body { grid-template-columns: 1fr; }
  .main { padding: 22px 18px 28px; }
}
</style>
</head>
<body>
<div class="main">
  <div data-screen-label="Início">
    <div class="head">
      <div>
        <div class="eyebrow" id="eyebrow">—</div>
        <h1 id="greet">Olá.</h1>
        <p class="briefing" id="briefing">Carregando o seu dia…</p>
      </div>
      <button class="btn" id="cta" title="Ir para a Extração">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 L12 16.5 L6.5 21 Z"/><path d="M12 3 L17.5 21 L12 16.5 Z"/></svg>
        Processar bilhetes
      </button>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi feat"><div class="k">P/L hoje</div><div class="v" id="kpi-pl-hoje">—</div><div class="d" id="kpi-pl-hoje-d">—</div></div>
    <div class="kpi"><div class="k">P/L do mês</div><div class="v" id="kpi-pl-mes">—</div><div class="d" id="kpi-pl-mes-d">—</div></div>
    <div class="kpi"><div class="k">Em jogo agora</div><div class="v acc" id="kpi-aberto">—</div><div class="d" id="kpi-aberto-d">—</div></div>
    <div class="kpi"><div class="k">Contas ativas</div><div class="v plain" id="kpi-contas">—</div><div class="d" id="kpi-contas-d">—</div></div>
  </div>

  <div class="body">
    <div class="col">
      <div class="panel">
        <div class="ph"><span class="tick"></span><h3>Em jogo agora</h3><span class="meta" id="risco-meta">—</span></div>
        <div class="plist" id="emjogo-list"><div class="empty">Carregando…</div></div>
        <div class="foot" id="emjogo-foot" style="display:none"><span>Retorno potencial se tudo ganhar</span><span id="emjogo-pot">—</span></div>
      </div>
      <div class="panel grow">
        <div class="ph"><span class="tick"></span><h3>Resultado por esporte</h3><span class="meta" id="esporte-mes">—</span></div>
        <div class="plist" id="esporte-list"><div class="empty">Carregando…</div></div>
      </div>
    </div>
    <div class="col">
      <div class="panel">
        <div class="ph"><span class="tick" style="background:var(--warn)"></span><h3 style="color:var(--warn)">Precisa de você</h3><span class="meta" id="pend-meta">—</span></div>
        <div class="plist" id="pend-list"><div class="empty">Carregando…</div></div>
      </div>
      <div class="panel grow">
        <div class="ph"><span class="tick"></span><h3>Últimas extrações</h3><span class="meta">RAIO-X · 7 dias</span></div>
        <div class="plist" id="hist-list"><div class="empty">Carregando…</div></div>
      </div>
    </div>
  </div>

  <div class="brandfoot">Sharp<span class="acc">en</span> your edge.</div>
</div>

<script>
// ── Helpers de dinheiro — cópia verbatim de dash/assets/js/app.js (fonte canônica).
// P/L = fmtPL (2 casas, sinal, U+2212, cor só no número); agregado = fmtR (inteiro);
// stake = moneyStake (2 casas, sem sinal, string crua); odd = fmtOdd. UI_REFERENCE §5.
function fmt(v,d=2){return Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtPL(v){const cls=v>=0?'pos':'neg';return`<span class="money ${cls}"><span class="money-sign">${v>=0?'+':'−'}R$</span><span class="money-val">${fmt(Math.abs(v))}</span></span>`;}
function fmtR(v){return`<span class="money"><span class="money-sign">R$</span><span class="money-val">${fmt(v,0)}</span></span>`;}
function moneyStake(v){const s=(v==null?'':String(v)).trim();if(!s)return'';return`<span class="money"><span class="money-sign">R$</span><span class="money-val">${esc(s)}</span></span>`;}
function fmtOdd(v){return Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPct(v,d=2){return (v>=0?'+':'−')+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d})+'%';}
function esc(v){if(v==null)return'';return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function num(v){if(v==null)return 0;if(typeof v==='number')return v;let s=String(v).trim();if(!s)return 0;if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');const n=parseFloat(s);return isFinite(n)?n:0;}

// ── Esportes (mapa compacto espelhando dash/data.js) ──
const SPORT_EMOJI={futebol:'⚽',basquete:'🏀',tenis:'🎾',mma:'🥊',f1:'🏎️',nfl:'🏈',nhl:'🏒',baseball:'⚾',volei:'🏐',handbol:'🤾',dardos:'🎯',esports:'🎮',multiplos:'🔗',peixe:'🐟',snooker:'🎱',golf:'⛳',rugby:'🏉'};
const SPORT_KEY={'Futebol':'futebol','Soccer':'futebol','NBA':'basquete','Basquete':'basquete','Basketball':'basquete','Tênis':'tenis','Tenis':'tenis','Tennis':'tenis','MMA':'mma','UFC':'mma','Boxe':'mma','F1':'f1','Fórmula 1':'f1','NFL':'nfl','Futebol Americano':'nfl','NHL':'nhl','Hóquei':'nhl','MLB':'baseball','Baseball':'baseball','Beisebol':'baseball','Vôlei':'volei','Volei':'volei','Handebol':'handbol','Handball':'handbol','Dardos':'dardos','Darts':'dardos','CS':'esports','CS:GO':'esports','Esports':'esports','eSports':'esports','Múltiplos':'multiplos','Multiplos':'multiplos','Snooker':'snooker','Golf':'golf','Golfe':'golf','Rugby':'rugby'};
function sportEmoji(nome){if(!nome)return'🏅';let k=SPORT_KEY[nome];if(!k){const kk=Object.keys(SPORT_KEY).find(x=>x.toLowerCase()===nome.toLowerCase());k=kk?SPORT_KEY[kk]:null;}return SPORT_EMOJI[k]||'🏅';}

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function pad2(n){return n<10?'0'+n:''+n;}
function localISO(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function quando(ts){const d=new Date(ts),now=new Date();const hm=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});const same=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();const ontem=new Date(now);ontem.setDate(now.getDate()-1);if(same(d,now))return'hoje '+hm;if(same(d,ontem))return'ontem '+hm;return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}

function goHost(hash){try{if(window.parent&&window.parent!==window){window.parent.location.hash=hash;return;}}catch(e){}window.location.href='/app#'+hash;}
document.getElementById('cta').addEventListener('click',()=>goHost('plan'));

const GLIFO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3 L12 16.5 L6.5 21 Z"/><path d="M12 3 L17.5 21 L12 16.5 Z"/></svg>';
function saudacao(h){if(h<12)return'Bom dia';if(h<18)return'Boa tarde';return'Boa noite';}
async function jget(url){try{const r=await fetch(url,{credentials:'same-origin'});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function histLoad(dono){try{const raw=localStorage.getItem('sharpen_raiox_hist::'+(dono||'_'));const arr=raw?JSON.parse(raw):[];const lim=Date.now()-7*24*3600*1000;return(Array.isArray(arr)?arr:[]).filter(h=>(h.ts||0)>=lim);}catch(e){return[];}}
function custosLoad(dono){try{return JSON.parse(localStorage.getItem('dash_custos_v2::'+(dono||'_'))||'null')||{};}catch(e){return{};}}
function parseForn(nome){const m=/^(.+?)\s*\[(.+?)\]$/.exec(nome||'');return m?m[2].trim():'';}
function el(id){return document.getElementById(id);}

async function boot(){
  const now=new Date();
  el('eyebrow').textContent=(now.toLocaleDateString('pt-BR',{weekday:'long'})+' · '+now.getDate()+' de '+MESES[now.getMonth()]).toUpperCase();

  const me=await jget('/me')||{};
  const dono=me.dono_efetivo||me.usuario||'';
  el('greet').textContent=saudacao(now.getHours())+', '+(dono||'operador')+'.';

  const [feed,abertasResp,parcResp,incompletos]=await Promise.all([
    jget('/dashboard/data'),
    jget('/bilhetes?extraction_state=aberta&archived=false&limit=1000&order=desc'),
    jget('/parceiros?arquivados=true'),
    jget('/incompletos'),
  ]);

  const rows=(feed&&feed.data)||[];
  const todayISO=localISO(now), mesPref=todayISO.slice(0,7), mesNome=MESES[now.getMonth()];
  let plHoje=0,nHoje=0,wHoje=0,plMes=0,turnMes=0,nMes=0;
  const sportHoje={}, sportMes={};
  rows.forEach(r=>{
    const l=Number(r.lucro)||0, st=Number(r.stake)||0, e=(r.esporte||'Outro').trim()||'Outro';
    if(r.data===todayISO){ plHoje+=l; nHoje++; if(l>0)wHoje++; sportHoje[e]=(sportHoje[e]||0)+l; }
    if((r.data||'').slice(0,7)===mesPref){ plMes+=l; turnMes+=st; nMes++; sportMes[e]=(sportMes[e]||0)+l; }
  });
  const roiMes=turnMes>0?(plMes/turnMes*100):0;
  const wrHoje=nHoje>0?Math.round(wHoje/nHoje*100):0;
  // esporte que mais puxou hoje (só se positivo)
  let topSport=null,topVal=0; Object.entries(sportHoje).forEach(([e,v])=>{if(v>topVal){topVal=v;topSport=e;}});

  // Abertas: exposição viva.
  const abertas=(abertasResp&&abertasResp.bilhetes)||[];
  const nAberto=(abertasResp&&abertasResp.total!=null)?abertasResp.total:abertas.length;
  let emJogo=0,potencial=0,paradas48=0; const lim48=Date.now()-48*3600*1000;
  abertas.forEach(b=>{const st=num(b.stake),od=num(b.odd);emJogo+=st;potencial+=od>0?st*od:st;const t=b.criado_em?new Date(b.criado_em).getTime():NaN;if(isFinite(t)&&t<lim48)paradas48++;});

  // Contas.
  const parceiros=(parcResp&&parcResp.parceiros)||[];
  const ativos=parceiros.filter(p=>!p.arquivado);
  const casasAtivas=new Set(ativos.map(p=>p.casa)).size;

  // Sem tipster.
  const porCasaTip=(incompletos&&incompletos.por_casa_tipster)||{};
  let semTipster=0; Object.values(porCasaTip).forEach(v=>semTipster+=(v||0));

  // Custos sem preencher (fornecedores ativos sem valor no store).
  const custos=custosLoad(dono); const fornsFaltando=new Set();
  ativos.forEach(p=>{const f=parseForn(p.nome);if(!f)return;if(custos[f+'||'+p.casa]==null)fornsFaltando.add(f);});

  // ── KPIs ──
  el('kpi-pl-hoje').innerHTML=fmtPL(plHoje);
  el('kpi-pl-hoje-d').innerHTML=nHoje>0?(nHoje+(nHoje===1?' aposta · ':' apostas · ')+wrHoje+'% acerto'):'sem apostas encerradas';
  el('kpi-pl-mes').innerHTML=fmtPL(plMes);
  el('kpi-pl-mes-d').innerHTML='ROI '+fmtPct(roiMes)+' · '+mesNome;
  el('kpi-aberto').textContent=nAberto.toLocaleString('pt-BR');
  el('kpi-aberto-d').innerHTML=fmtR(emJogo)+' em risco';
  el('kpi-contas').textContent=ativos.length.toLocaleString('pt-BR');
  el('kpi-contas-d').textContent='de '+parceiros.length.toLocaleString('pt-BR')+' · '+casasAtivas+(casasAtivas===1?' casa':' casas');

  // ── Pendências (ação) ──
  const pend=[];
  if(semTipster>0)pend.push({dot:'var(--warn)',t:semTipster+(semTipster===1?' bilhete aguardando tipster':' bilhetes aguardando tipster'),s:'Confirme o tipster na extração',r:'resolver →',go:'plan'});
  if(paradas48>0)pend.push({dot:'var(--warn)',t:paradas48+(paradas48===1?' aposta parada há 48h+':' apostas paradas há 48h+'),s:'Sem resultado — revise as abertas',r:'revisar →',go:'dash/apostas'});
  if(fornsFaltando.size>0)pend.push({dot:'var(--accent-2)',t:fornsFaltando.size+(fornsFaltando.size===1?' fornecedor sem custo':' fornecedores sem custo'),s:'Impacta o P/L líquido do mês',r:'preencher →',go:'dash/custos'});
  el('pend-meta').textContent=pend.length?(pend.length+(pend.length===1?' item':' itens')):'tudo em dia';
  const pendHost=el('pend-list');
  if(!pend.length){pendHost.innerHTML='<div class="empty ok">Nada esperando por você. ✓</div>';}
  else{pendHost.innerHTML=pend.map(p=>'<div class="lrow clic" data-go="'+p.go+'"><span class="dot" style="background:'+p.dot+'"></span><div class="lc"><div class="t">'+esc(p.t)+'</div><div class="s">'+esc(p.s)+'</div></div><span class="r acc">'+p.r+'</span></div>').join('');
    pendHost.querySelectorAll('.lrow[data-go]').forEach(e=>e.addEventListener('click',()=>goHost(e.dataset.go)));}

  // ── Briefing (narrativo, SEM repetir o número do KPI) ──
  const nP=pend.length;
  const hook=nP>0?(nP===1?'Você tem <b>1 coisa</b> esperando por você.':'Você tem <b>'+nP+' coisas</b> esperando por você.'):'Nada pendente — está tudo em dia. ✓';
  let brief;
  if(nHoje>0){ brief='<b>'+nHoje+(nHoje===1?' aposta encerrada':' apostas encerradas')+'</b> hoje'+(topSport?', <b>'+esc(topSport)+'</b> puxou o dia':'')+'. '+hook; }
  else if(nAberto>0){ brief='Nenhuma aposta encerrada hoje — <b>'+nAberto+'</b> em jogo, '+fmtR(emJogo)+' em risco. '+hook; }
  else { brief='Nenhuma aposta encerrada hoje e nada em jogo. '+hook; }
  el('briefing').innerHTML=brief;

  // ── Em jogo agora (exposição viva) — o "em risco" vive só no KPI (sem eco aqui) ──
  el('risco-meta').textContent = nAberto>0 ? (nAberto+(nAberto===1?' aposta':' apostas')) : '';
  const ejHost=el('emjogo-list'), ejFoot=el('emjogo-foot');
  if(!abertas.length){ ejHost.innerHTML='<div class="empty ok">Nenhuma aposta em jogo — tudo resolvido. ✓</div>'; }
  else{
    const vis=abertas.slice(0,7);
    ejHost.innerHTML=vis.map(b=>{
      const titulo=esc(b.aposta||b.descricao||b.esporte||'Aposta');
      const sub=[b.casa,b.parceiro,b.esporte].filter(Boolean).map(esc).join(' · ');
      const od=num(b.odd);
      const right=moneyStake(b.stake)+(od>0?'<span class="odd">@ '+fmtOdd(od)+'</span>':'');
      return '<div class="lrow"><span class="spdot">'+sportEmoji(b.esporte)+'</span><div class="lc"><div class="t">'+titulo+'</div><div class="s">'+sub+'</div></div><span class="r">'+right+'</span></div>';
    }).join('');
    if(abertas.length>vis.length) ejHost.innerHTML+='<div class="empty" style="padding:9px 18px;text-align:left">+ '+(abertas.length-vis.length)+' outras em jogo</div>';
    el('emjogo-pot').innerHTML=fmtR(potencial);
    ejFoot.style.display='';
  }

  // ── Resultado por esporte (mês) — de onde vem o P/L ──
  el('esporte-mes').textContent=mesNome;
  const espHost=el('esporte-list');
  const espArr=Object.entries(sportMes).map(([e,v])=>({e,v})).sort((a,b)=>Math.abs(b.v)-Math.abs(a.v)).slice(0,5);
  const maxAbs=espArr.reduce((m,x)=>Math.max(m,Math.abs(x.v)),0)||1;
  if(!espArr.length){ espHost.innerHTML='<div class="empty">Sem apostas encerradas em '+mesNome+'.</div>'; }
  else{
    espHost.innerHTML=espArr.map(x=>{
      const w=Math.max(3,Math.round(Math.abs(x.v)/maxAbs*100));
      const cls=x.v>=0?'pos':'neg';
      return '<div class="bar"><span class="be">'+sportEmoji(x.e)+'</span><div class="bn"><div class="bname">'+esc(x.e)+'</div><div class="btrack"><div class="bfill '+cls+'" style="width:'+w+'%"></div></div></div><span class="bval">'+fmtPL(x.v)+'</span></div>';
    }).join('');
  }

  // ── Últimas extrações (RAIO-X) ──
  const hist=histLoad(dono);
  const histHost=el('hist-list');
  if(!hist.length){ histHost.innerHTML='<div class="empty">Nenhuma extração nos últimos 7 dias.</div>'; }
  else{
    histHost.innerHTML=hist.slice(0,7).map(h=>{
      const quem=esc(h.casa||'Extração')+(h.parceiro?' · '+esc(h.parceiro):'');
      const det=(h.dup?h.dup+' dup · ':'')+(h.st==='warn'?'pendência':'limpa');
      const sub=quando(h.ts)+' · '+(h.itens||0)+' item(ns) · '+det;
      const conf=h.conf!=null?h.conf+'%':'—';
      const st=h.st==='warn'?'warn':'ok';
      return '<div class="lrow clic" data-go="plan"><span class="hglifo '+st+'">'+GLIFO+'</span><div class="lc"><div class="t">'+quem+'</div><div class="s">'+esc(sub)+'</div></div><span class="r">'+conf+'</span></div>';
    }).join('');
    histHost.querySelectorAll('.lrow[data-go]').forEach(e=>e.addEventListener('click',()=>goHost(e.dataset.go)));
  }
}
boot();
</script>
</body>
</html>
