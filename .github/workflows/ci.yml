name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Compilar (checagem de sintaxe)
        run: python -m compileall app tools scripts

      - name: Testes de fórmulas financeiras
        run: pytest -q

      - name: Auditoria casa × global
        run: python tools/audit_casas.py

      - name: Check de tokens de marca
        run: node scripts/tokens/check-tokens.mjs
